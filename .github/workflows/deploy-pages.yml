# Main-branch GitHub Pages deploy path.
#
# Contract (see docs/internal/processes/ci-deploy-foundation-relevant-files.md
# and docs/operations.md):
# - Trigger: push to main (including merges). No manual publish step.
# - validate runs make setup, check, test, build, guard-pages-deployed-artifact,
#   budget — the same Makefile path as local/CI verification (reproduce each
#   stage with make <target>).
# - Guard reuses validate's out/ (no second full export) before upload.
# - deploy has needs: validate; failed validation never starts deploy for that run.
# - Artifact: out/ from make build, uploaded in validate and published by deploy.
name: Deploy GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Canonical validation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: make setup

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Run typecheck and lint
        run: make check

      - name: Run tests
        run: make test

      - name: Build static export
        run: make build
        env:
          # Project-site prefix for https://portpowered.github.io/you-agent-factory-docs
          # so exported HTML references /you-agent-factory-docs/_next (not bare /_next).
          GITHUB_PAGES_BASE_PATH: /you-agent-factory-docs
          # Bake GA4 Measurement ID into the static export (code also falls back
          # to the same ID when this env is unset — see resolveGaMeasurementId).
          NEXT_PUBLIC_GA_MEASUREMENT_ID: G-80P18Q3LWQ

      - name: Guard Pages deployed artifact
        # Reuses validate's out/ only — must not run another make build / build:export.
        run: make guard-pages-deployed-artifact

      - name: Enforce exported-site budget gate
        run: make budget

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload static export artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Next.js static export output from `make build`; consumed by deploy below.
          path: out/

  deploy:
    name: Deploy to GitHub Pages
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy static export to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
