# Main-branch GitHub Pages deploy path.
# Validation runs first via the root Makefile contract; deploy jobs only start after it succeeds.
name: Deploy GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Canonical validation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: make setup

      - name: Run typecheck and lint
        run: make check

      - name: Run tests
        run: make test

      - name: Build static export
        run: make build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload static export artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Next.js static export output from `make build`; consumed by deploy-pages below.
          path: out/

  deploy:
    name: Deploy to GitHub Pages
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy static export to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
