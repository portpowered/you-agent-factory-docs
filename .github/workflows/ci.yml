name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup
        run: make setup

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Run typecheck and lint
        run: make check

      - name: Run tests
        run: make test

      - name: Build static export
        run: make build

      - name: Run early foundation quality gate
        run: make quality-gate

      - name: Exported-site budget gate
        run: make budget

      - name: Component coverage enforcement
        run: make component-coverage
