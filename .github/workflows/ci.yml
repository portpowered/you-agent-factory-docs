name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup
        run: make setup

      - name: Early foundation quality gate
        run: make quality-gate

      - name: Component coverage enforcement
        run: make component-coverage
