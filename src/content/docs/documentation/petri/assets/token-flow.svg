<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 260" role="img" aria-labelledby="token-flow-title token-flow-desc">
  <title id="token-flow-title">Petri / CPN token flow</title>
  <desc id="token-flow-desc">Work token moves from place task:init through the process workstation transition to accepted, continue, rejection, or failure outcome places.</desc>
  <rect width="720" height="260" fill="#f8fafc"/>
  <!-- place: task:init -->
  <circle cx="70" cy="130" r="36" fill="#e2e8f0" stroke="#0f172a" stroke-width="2"/>
  <text x="70" y="126" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#0f172a">task:init</text>
  <text x="70" y="142" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#334155">place</text>
  <circle cx="70" cy="130" r="8" fill="#0f172a"/>
  <!-- arrow to transition -->
  <line x1="106" y1="130" x2="190" y2="130" stroke="#0f172a" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- transition: process workstation -->
  <rect x="190" y="96" width="140" height="68" rx="10" fill="#0f172a" stroke="#0f172a" stroke-width="2"/>
  <text x="260" y="124" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#f8fafc">process</text>
  <text x="260" y="142" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#cbd5e1">transition</text>
  <!-- arrows to outcomes -->
  <line x1="330" y1="110" x2="410" y2="48" stroke="#0f172a" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="330" y1="122" x2="410" y2="100" stroke="#0f172a" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="330" y1="138" x2="410" y2="160" stroke="#0f172a" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="330" y1="150" x2="410" y2="212" stroke="#0f172a" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- outcome places -->
  <circle cx="470" cy="48" r="32" fill="#dcfce7" stroke="#14532d" stroke-width="2"/>
  <text x="470" y="44" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#14532d">accepted</text>
  <text x="470" y="58" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#166534">place</text>
  <circle cx="470" cy="100" r="32" fill="#e2e8f0" stroke="#0f172a" stroke-width="2"/>
  <text x="470" y="96" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#0f172a">continue</text>
  <text x="470" y="110" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#334155">place</text>
  <circle cx="470" cy="160" r="32" fill="#ffedd5" stroke="#9a3412" stroke-width="2"/>
  <text x="470" y="156" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#9a3412">rejection</text>
  <text x="470" y="170" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#c2410c">place</text>
  <circle cx="470" cy="212" r="32" fill="#fee2e2" stroke="#991b1b" stroke-width="2"/>
  <text x="470" y="208" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#991b1b">failure</text>
  <text x="470" y="222" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#b91c1c">place</text>
  <!-- legend -->
  <text x="560" y="100" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#334155">Circles = places</text>
  <text x="560" y="118" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#334155">Box = workstation</text>
  <text x="560" y="136" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#334155">Arrows = token route</text>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#0f172a"/>
    </marker>
  </defs>
</svg>
